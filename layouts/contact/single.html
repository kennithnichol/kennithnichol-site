{{ define "main" }}
<article class="single">
  <div class="container">
    <header class="single-header">
      <p class="eyebrow">{{ .Site.Title }}</p>
      <h1>{{ .Title }}</h1>
    </header>
    <div class="prose">
      {{ .Content }}
      <form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" class="contact-form">
        <input type="hidden" name="form-name" value="contact">
        <p class="visually-hidden">
          <label>Do not fill this out: <input name="bot-field"></label>
        </p>
        <div class="form-field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required autocomplete="name">
        </div>
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required></textarea>
        </div>
        <button type="submit" class="cta-primary">Send message</button>
      </form>
      <p>For web development and consulting work, find me on
      <a href="{{ .Site.Params.toptal }}">Toptal</a>.</p>
    </div>
  </div>
</article>
{{ end }}
