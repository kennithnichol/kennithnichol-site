<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  <title>{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ .Site.Title }}</title>

  <!-- Open Graph -->
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:title" content="{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ .Site.Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:locale" content="en_CA">
  <meta property="og:image" content="{{ .Site.BaseURL }}images/kennith-nichol.jpg">

  <!-- Theme colour for mobile browser chrome -->
  <meta name="theme-color" content="#f9f8f5" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#131210" media="(prefers-color-scheme: dark)">

  <!-- Favicon — replace with your own -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <link rel="canonical" href="{{ .Permalink }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<a href="#main" class="skip-link">Skip to content</a>

<header class="site-header">
  <div class="container">
    <a href="/" class="site-name">{{ .Site.Title }}</a>
    <nav aria-label="Primary navigation">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>

<main id="main" tabindex="-1">
  {{ block "main" . }}{{ end }}
</main>

<footer class="site-footer">
  <div class="container">
    <span>© {{ now.Year }} Kennith Nichol</span>
    <span>Comox Valley, BC · Canada</span>
  </div>
</footer>

</body>
</html>
